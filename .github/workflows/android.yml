name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libgdbm-compat-dev \
            liblzma-dev \
            libreadline-dev \
            libncursesw5-dev \
            libffi-dev \
            uuid-dev \
            libffi7 \
            pkg-config \
            autoconf \
            automake \
            libtool \
            cmake \
            ninja-build \
            zip \
            unzip

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install "buildozer==1.5.0"
          pip install "cython==0.29.36"

      - name: Build with Buildozer
        run: |
          # 1. Создаем структуру папок для Android SDK, которую ждет Buildozer
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
          
          # 2. Скачиваем официальные утилиты командной строки Android SDK
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O tools.zip
          unzip -q tools.zip && rm tools.zip
          
          # 3. Приводим структуру папок к виду cmdline-tools/latest/bin/...
          mv cmdline-tools latest
          
          # 4. Прокидываем путь к sdkmanager в системный PATH
          export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          
          # 5. Принимаем все лицензии
          yes | sdkmanager --licenses || true
          
          # Возвращаемся в корень проекта и запускаем билд
          cd $GITHUB_WORKSPACE
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KDAT-apk
          path: bin/*.apk
name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Убрали cache: 'pip', чтобы он не искал несуществующий requirements.txt

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing git zip unzip autoconf libtool libtool-bin libffi-dev libssl-dev cmake automake pkg-config
          python -m pip install --upgrade pip
          pip install "buildozer==1.5.0" "cython<3"

      # --- НАДЕЖНЫЙ КЭШ ДЛЯ СДК, НДК И СОБРАННЫХ РЕЦЕПТОВ PYGAME ---
      - name: Cache Buildozer and Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      # ----------------------------------------------------

      - name: Build APK with Buildozer
        run: |
          # Проверяем, развернут ли уже SDK из кэша. Если нет — качаем заново.
          if [ ! -d "submodule" ] && [ ! -f "~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "SDK not found in cache. Downloading..."
            # 1. Готовим cmdline-tools
            mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
            cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O tools.zip
            unzip -q tools.zip && rm tools.zip
            mv cmdline-tools latest
            
            # 2. Обманываем проверку путей через симлинк
            mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
            ln -sf ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          else
            echo "SDK successfully restored from cache!"
          fi
          
          # 3. Лицензии (проверяем/обновляем в любом случае)
          export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true
          
          # 4. Запуск сборки
          cd $GITHUB_WORKSPACE
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KDAT-apk
          path: bin/*.apk
